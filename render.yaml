services:
  - type: web
    name: menuto-backend
    env: docker
    region: oregon
    plan: starter          # or free while testing
    dockerfilePath: menuto-backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: API_ENV
        value: prod
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://usemenuto.com,https://app.usemenuto.com
