<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuto - Preferences</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
                    colors: { cream: '#FFFEF4', terra: '#CE3E25' },
                    boxShadow: {
                        'soft': '0 4px 16px rgba(0, 0, 0, 0.04)',
                        'warm': '0 12px 40px -12px rgba(206, 62, 37, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { width: 393px; height: 852px; margin: 0 auto; overflow: hidden; position: relative; border-radius: 40px; box-shadow: 0 0 80px rgba(0,0,0,0.08); }
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #F5F5F4; border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: #CE3E25; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px rgba(206,62,37,0.3); }
    </style>
</head>
<body class="font-sans text-stone-900 bg-white">

    <div class="w-full h-full flex flex-col relative overflow-y-auto">
        <!-- Nav -->
        <div class="px-6 pt-14 pb-2 flex justify-between items-center">
            <button class="w-10 h-10 rounded-full bg-stone-50 flex items-center justify-center text-stone-600">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <span class="text-[12px] font-bold uppercase tracking-widest text-stone-400">Step 3 of 3</span>
            <div class="w-10"></div>
        </div>

        <!-- Big question -->
        <div class="px-6 pt-4 pb-2">
            <h1 class="text-[36px] font-bold leading-[0.95] tracking-tight text-stone-900 mb-2">What are you<br>craving?</h1>
            <p class="text-[15px] text-stone-400">Tap all that sound good right now</p>
        </div>

        <!-- Craving pills -->
        <div class="flex flex-wrap gap-2.5 px-6 pt-5 pb-2">
            <button class="bg-terra text-white px-5 py-2.5 rounded-full font-bold text-[15px] shadow-warm">salty</button>
            <button class="bg-stone-50 border border-stone-100 text-stone-500 px-5 py-2.5 rounded-full font-medium text-[15px]">sweet</button>
            <button class="bg-terra text-white px-5 py-2.5 rounded-full font-bold text-[15px] shadow-warm">crispy</button>
            <button class="bg-stone-50 border border-stone-100 text-stone-500 px-5 py-2.5 rounded-full font-medium text-[15px]">light</button>
            <button class="bg-stone-50 border border-stone-100 text-stone-500 px-5 py-2.5 rounded-full font-medium text-[15px]">acidic</button>
            <button class="bg-stone-50 border border-stone-100 text-stone-500 px-5 py-2.5 rounded-full font-medium text-[15px]">savory</button>
            <button class="bg-terra text-white px-5 py-2.5 rounded-full font-bold text-[15px] shadow-warm">spicy</button>
            <button class="bg-stone-50 border border-stone-100 text-stone-500 px-5 py-2.5 rounded-full font-medium text-[15px]">umami</button>
        </div>

        <!-- Slider cards -->
        <div class="flex flex-col gap-3 px-6 pt-6">
            <div class="bg-stone-50/80 border border-stone-100 rounded-[20px] p-5">
                <p class="font-semibold text-[15px] text-stone-900 mb-3">How hungry are you?</p>
                <input type="range" min="0" max="100" value="55" class="w-full mb-2">
                <p class="text-[13px] text-terra font-medium text-center">Could eat, but not a lot</p>
            </div>
            <div class="bg-stone-50/80 border border-stone-100 rounded-[20px] p-5">
                <p class="font-semibold text-[15px] text-stone-900 mb-3">Your vibe tonight?</p>
                <input type="range" min="0" max="100" value="20" class="w-full mb-2">
                <div class="flex justify-between">
                    <p class="text-[12px] text-terra font-medium">← My taste</p>
                    <p class="text-[12px] text-stone-400">Fan favorites →</p>
                </div>
            </div>
        </div>

        <!-- CTA -->
        <div class="flex-1 flex flex-col justify-end px-6 pb-10 pt-8">
            <button class="w-full bg-stone-900 text-white py-4.5 rounded-full text-[16px] font-bold flex items-center justify-center gap-2 shadow-[0_8px_30px_rgba(0,0,0,0.08)]" style="padding: 18px;">
                <span>Find my dish</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script>lucide.createIcons();</script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</body></html>
